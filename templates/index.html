<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SummarizerPro</title>
    <link rel="stylesheet" href="/static/style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Karla:ital,wght@0,200..800;1,200..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

<script>
  async function summarizeText() {
    const text = document.getElementById("input-text").value;
    const maxLength = 300;
    const loadingSpinner = document.getElementById("loading-spinner");
    const summaryText = document.getElementById("output-summary");

    // Show spinner and hide the summary text initially
    loadingSpinner.style.display = 'block';
    summaryText.style.display = 'none';

    try {
        const response = await fetch("/summarize", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text: text, max_length: parseInt(maxLength) }),
        });

        const result = await response.json();

        // Hide spinner and display the summary
        loadingSpinner.style.display = 'none';
        summaryText.style.display = 'block';
        summaryText.innerText = result.summary;

    } catch (error) {
        console.error('Error generating summary:', error);
        loadingSpinner.style.display = 'none';
        summaryText.style.display = 'block';
        summaryText.innerText = "Failed to generate summary. Please try again.";
    }
  }
  
  document.addEventListener("DOMContentLoaded", function () {
    const textarea = document.getElementById("input-text");
    var charCount = document.getElementById("char-count");
    const pasteButton = document.getElementById("paste-button");
    const copyButton = document.getElementById('copy-button');
    const copyText = document.getElementById('output-summary');

    // Function to update character count
    function updateCharCount() {
      const remaining = 2000 - textarea.value.length;
      charCount.textContent =  (remaining == 0) ? ("Maximum limit reached") : (`${remaining} characters remaining`);
    }

    // Initial character count
    updateCharCount();

    // Update character count on input
    textarea.addEventListener("input", updateCharCount);

    // Paste text from clipboard into textarea
    pasteButton.addEventListener("click", async () => {
      try {
        const textToPaste = await navigator.clipboard.readText();

        // Check if there's enough space left in the textarea for the text to paste
        if (textarea.value.length + textToPaste.length <= 2000) {
          textarea.value += textToPaste;
        } else {
          const remainingSpace = 2000 - textarea.value.length;
          textarea.value += textToPaste.substring(0, remainingSpace);
        }

        // Update character count after pasting
        updateCharCount();
      } catch (error) {
        alert(
          "Failed to read clipboard content. Please ensure clipboard permissions are enabled."
        );
      }
    });

    // Copy summary text to clipboard
    copyButton.addEventListener('click', function() {
        const textToCopy = copyText.innerText;
        navigator.clipboard.writeText(textToCopy).then(() => {
            alert('Text copied to clipboard!');
        }).catch(err => {
            console.error('Failed to copy text: ', err);
        });
    });
  });
</script>





  </head>
  <body>


    <nav class="navbar">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">
          <img
            src="/static/images/Group 2.png"
            alt="Logo"
            width="48"
            height="48"
            class="d-inline-block align-text"
          />
          Summarizer Pro
        </a>
      </div>
    </nav>

    <div class="container mt-4">
      <div class="row gap-3">
          <!-- Input Text Column -->
          <div class="col input_text">
              <div class="input_content">
                <div class="input_header d-flex align-items-center justify-content-between">
                  <h2 class="input_heading">Input Text</h2>
                  <button id="paste-button" class="paste">
                    <img src="/static/images/mdi-light_content-paste.png" alt="paste button" width="24px" height="24px">
                </button>
                </div>
                  
                  <div class="mt-3">
                      <textarea class="form-control" id="input-text" maxlength="2000" placeholder="Enter your text..." 
                          style="width: 100%; height: 436px; background-color: #FAFAFA; border-radius: 28px; padding: 23px 32px; resize: none; font-size: 13px;"></textarea>
                      <small id="char-count" class="form-text text-muted">2000 characters remaining</small>
                      
                  </div>
                  
                  <div class="d-flex justify-content-center">
                      <button class="summarize_button mt-3" onclick="summarizeText()">Summarize</button>
                  </div>
              </div>
          </div>
  
          <!-- Summary Column -->
          <div class="col summary">
               <div class="summary_content">
                <div class="summary_header d-flex align-items-center justify-content-between">
                  <h2 class="summary_heading">Summary</h2>
                  <button id="copy-button" class="paste">
                    <img src="/static/images/stash_copy-light.png" alt="paste button" width="32px" height="32px">
                </button>
                </div>
                  <div class="mt-3">
                     
                      <div id="summary-output-container" class="form-control" 
                          style="width: 100%; height: 436px; background-color: #FAFAFA7d; border-radius: 28px; padding: 23px 32px; word-wrap: break-word; overflow-y: auto;">
                          <p id="output-summary" class="mb-0" style="height: 100%; color: rgb(39, 39, 39); font-size: 13px;">Your summary will appear here.</p>
                          <div id="loading-spinner" class="spinner" style="display: none;"></div>
                      </div>
                  </div>
              </div>
          </div>
      </div>
  </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
